<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${program.experienceProgramTitle} + ' | 체험 프로그램 상세'">체험 프로그램 상세</title>
    <link rel="stylesheet" href="/css/experience/program-detail.css">
</head>
<body>
<header class="page-header">
    <div class="header-inner">
        <a class="brand" th:href="@{/main/main}">TRY-CATCH</a>
        <nav class="header-nav">
            <a th:href="@{/experience/list}">체험 프로그램</a>
            <a th:href="@{/mypage/mypage}" th:if="${session.member != null}">마이페이지</a>
            <a th:href="@{/main/log-in(re_url='/experience/list')}" th:if="${session.member == null}">로그인</a>
        </nav>
    </div>
</header>

<main class="page-main">
    <a class="back-link" th:href="@{/experience/list}">목록으로 돌아가기</a>

    <section class="hero-card">
        <div class="hero-media" th:with="thumb=${#lists.isEmpty(program.experienceProgramFiles) ? null : program.experienceProgramFiles.get(0)}">
            <img th:if="${thumb != null and thumb.fileContentType != null and thumb.fileContentType.name() == 'IMAGE'}"
                 th:src="@{/api/files/display(filePath=${thumb.filePath}, fileName=${thumb.fileName})}"
                 alt="프로그램 대표 이미지">
            <div class="media-placeholder" th:unless="${thumb != null and thumb.fileContentType != null and thumb.fileContentType.name() == 'IMAGE'}">
                NO IMAGE
            </div>
        </div>

        <div class="hero-content">
            <div class="top-meta">
                <span class="corp-name" th:text="${program.corpCompanyName}">기업명</span>
                <span class="status-badge" th:switch="${program.experienceProgramStatus != null ? program.experienceProgramStatus.value : 'unknown'}">
                    <span th:case="'recruiting'">모집중</span>
                    <span th:case="'draft'">진행중</span>
                    <span th:case="'closed'">모집마감</span>
                    <span th:case="'cancelled'">종료</span>
                    <span th:case="*">상태없음</span>
                </span>
            </div>

            <h1 th:text="${program.experienceProgramTitle}">프로그램 제목</h1>

            <p class="subtitle" th:text="${program.experienceProgramJob != null ? program.experienceProgramJob : '직무 미정'}">직무</p>

            <div class="meta-grid">
                <div class="meta-item">
                    <span class="label">모집인원</span>
                    <span class="value" th:text="|${program.experienceProgramRecruitmentCount}명|">0명</span>
                </div>
                <div class="meta-item">
                    <span class="label">마감일</span>
                    <span class="value" th:text="${program.experienceProgramDeadline != null ? program.experienceProgramDeadline : '-'}">-</span>
                </div>
                <div class="meta-item">
                    <span class="label">근무기간</span>
                    <span class="value" th:text="${program.experienceProgramWorkDays != null ? program.experienceProgramWorkDays : '-'}">-</span>
                </div>
                <div class="meta-item">
                    <span class="label">근무시간</span>
                    <span class="value" th:text="${program.experienceProgramWorkHours != null ? program.experienceProgramWorkHours : '-'}">-</span>
                </div>
                <div class="meta-item">
                    <span class="label">경험 레벨</span>
                    <span class="value" th:text="${program.experienceProgramLevel != null ? program.experienceProgramLevel : '-'}">-</span>
                </div>
                <div class="meta-item">
                    <span class="label">조회수</span>
                    <span class="value" th:text="${program.experienceProgramViewCount}">0</span>
                </div>
            </div>

            <div class="action-row">
                <button id="applyButton"
                        class="apply-button"
                        th:if="${canApply and !hasApplied}"
                        type="button"
                        th:data-program-id="${program.id}">즉시 지원</button>

                <button class="apply-button disabled"
                        th:if="${canApply and hasApplied}"
                        type="button"
                        disabled>이미 지원한 프로그램입니다</button>

                <a class="apply-button login"
                   th:if="${loginMember == null}"
                   th:href="@{/main/log-in(re_url=${'/experience/program/' + program.id})}">로그인 후 지원</a>

                <button class="apply-button disabled"
                        th:if="${loginMember != null and !canApply}"
                        type="button"
                        disabled>개인회원만 지원 가능</button>
            </div>
        </div>
    </section>

    <section class="content-section">
        <h2>상세 설명</h2>
        <div class="description-box" th:utext="${program.experienceProgramDescription}">설명 없음</div>
    </section>

    <section class="content-section" th:if="${!#lists.isEmpty(program.experienceProgramFiles)}">
        <h2>첨부 이미지</h2>
        <ul class="gallery">
            <li th:each="file : ${program.experienceProgramFiles}"
                th:if="${file.fileContentType != null and file.fileContentType.name() == 'IMAGE'}">
                <img th:src="@{/api/files/display(filePath=${file.filePath}, fileName=${file.fileName})}"
                     th:alt="${file.fileOriginalName != null ? file.fileOriginalName : '첨부 이미지'}">
            </li>
        </ul>
    </section>
</main>

<script src="/js/experience/program-detail.js"></script>
</body>
</html>
