<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>체험 프로그램 목록</title>
    <link rel="stylesheet" href="/css/experience/program-list.css">
</head>
<body>
<header class="page-header">
    <div class="header-inner">
        <a class="brand" th:href="@{/main/main}">TRY-CATCH</a>
        <nav class="header-nav">
            <a th:href="@{/experience/list}">체험 프로그램</a>
            <a th:href="@{/mypage/mypage}" th:if="${session.member != null}">마이페이지</a>
            <a th:href="@{/main/log-in(re_url='/experience/list')}" th:if="${session.member == null}">로그인</a>
        </nav>
    </div>
</header>

<main class="page-main">
    <section class="search-section">
        <h1>체험 프로그램</h1>
        <p class="result-text" th:text="|총 ${programWithPaging.total}건|">총 0건</p>

        <form class="search-form" method="get" th:action="@{/experience/list}">
            <label>
                상태
                <select name="status">
                    <option value="all" th:selected="${status == 'all'}">전체</option>
                    <option value="recruiting" th:selected="${status == 'recruiting'}">모집중</option>
                    <option value="draft" th:selected="${status == 'draft'}">진행중</option>
                    <option value="closed" th:selected="${status == 'closed'}">모집마감</option>
                    <option value="cancelled" th:selected="${status == 'cancelled'}">종료</option>
                </select>
            </label>

            <label>
                직무
                <select name="job">
                    <option value="" th:selected="${job == null or job == ''}">전체</option>
                    <option th:each="jobItem : ${jobs}" th:value="${jobItem}" th:text="${jobItem}" th:selected="${job == jobItem}">직무</option>
                </select>
            </label>

            <label>
                정렬
                <select name="sort">
                    <option value="latest" th:selected="${sort == 'latest'}">최신순</option>
                    <option value="views" th:selected="${sort == 'views'}">조회수순</option>
                    <option value="deadline" th:selected="${sort == 'deadline'}">마감임박순</option>
                </select>
            </label>

            <label>
                검색
                <input type="text" name="keyword" th:value="${keyword}" placeholder="공고명/기업명 검색">
            </label>

            <button type="submit">검색</button>
        </form>
    </section>

    <section class="list-section" th:if="${!#lists.isEmpty(programWithPaging.programs)}">
        <ul class="program-grid">
            <li class="program-card" th:each="program : ${programWithPaging.programs}">
                <a class="thumbnail" th:href="@{/experience/program/{id}(id=${program.id})}" th:with="thumb=${#lists.isEmpty(program.experienceProgramFiles) ? null : program.experienceProgramFiles.get(0)}">
                    <img th:if="${thumb != null and thumb.fileContentType != null and thumb.fileContentType.name() == 'IMAGE'}"
                         th:src="@{/api/files/display(filePath=${thumb.filePath}, fileName=${thumb.fileName})}"
                         alt="프로그램 대표 이미지">
                    <div class="thumb-placeholder" th:unless="${thumb != null and thumb.fileContentType != null and thumb.fileContentType.name() == 'IMAGE'}">NO IMAGE</div>
                </a>

                <div class="card-body">
                    <div class="meta-row">
                        <span class="corp-name" th:text="${program.corpCompanyName}">기업명</span>
                        <span class="status-badge" th:switch="${program.experienceProgramStatus != null ? program.experienceProgramStatus.value : 'unknown'}">
                            <span th:case="'recruiting'">모집중</span>
                            <span th:case="'draft'">진행중</span>
                            <span th:case="'closed'">모집마감</span>
                            <span th:case="'cancelled'">종료</span>
                            <span th:case="*">상태없음</span>
                        </span>
                    </div>

                    <h2>
                        <a th:href="@{/experience/program/{id}(id=${program.id})}" th:text="${program.experienceProgramTitle}">공고 제목</a>
                    </h2>

                    <p class="description" th:text="${program.descriptionText != null and !program.descriptionText.isEmpty() ? program.descriptionText : '상세 설명이 등록되지 않았습니다.'}">설명</p>

                    <div class="info-row">
                        <span th:text="${program.experienceProgramJob != null ? program.experienceProgramJob : '직무 미정'}">직무</span>
                        <span th:text="|조회수 ${program.experienceProgramViewCount}|">조회수</span>
                        <span th:text="${program.experienceProgramDeadline != null ? '마감 ' + program.experienceProgramDeadline : '마감일 미정'}">마감일</span>
                    </div>
                </div>
            </li>
        </ul>
    </section>

    <section class="empty-section" th:if="${#lists.isEmpty(programWithPaging.programs)}">
        조건에 맞는 체험 프로그램이 없습니다.
    </section>

    <nav class="pagination" th:if="${programWithPaging.criteria.realEnd > 1}">
        <a class="page-link"
           th:if="${programWithPaging.criteria.page > 1}"
           th:href="@{/experience/list(page=${programWithPaging.criteria.page - 1}, status=${status}, keyword=${keyword}, job=${job}, sort=${sort})}">‹</a>

        <a class="page-link"
           th:each="pageNum : ${#numbers.sequence(programWithPaging.criteria.startPage, programWithPaging.criteria.endPage)}"
           th:href="@{/experience/list(page=${pageNum}, status=${status}, keyword=${keyword}, job=${job}, sort=${sort})}"
           th:text="${pageNum}"
           th:classappend="${pageNum == programWithPaging.criteria.page} ? ' active'">1</a>

        <a class="page-link"
           th:if="${programWithPaging.criteria.page < programWithPaging.criteria.realEnd}"
           th:href="@{/experience/list(page=${programWithPaging.criteria.page + 1}, status=${status}, keyword=${keyword}, job=${job}, sort=${sort})}">›</a>
    </nav>
</main>
</body>
</html>
