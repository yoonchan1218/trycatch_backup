<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>체험 프로그램 목록</title>
    <link rel="stylesheet" th:href="@{/css/experience/list.css}" href="/css/experience/list.css" />
</head>
<body>
<main class="experience-list-page">
    <header class="list-header">
        <h1><a th:href="@{/main/main}" href="/main/main">TRY-CATCH 체험 프로그램</a></h1>
    </header>

    <section class="list-filters">
        <form id="filterForm" th:action="@{/experience/list}" method="get">
            <input type="hidden" name="page" id="pageInput" value="1" />

            <label for="statusSelect">상태</label>
            <select id="statusSelect" name="status">
                <option value="all" th:selected="${status == 'all'}">전체</option>
                <option value="recruiting" th:selected="${status == 'recruiting'}">모집중</option>
                <option value="draft" th:selected="${status == 'draft'}">진행중</option>
                <option value="closed" th:selected="${status == 'closed'}">모집마감</option>
                <option value="cancelled" th:selected="${status == 'cancelled'}">종료</option>
            </select>

            <label for="jobSelect">직무</label>
            <select id="jobSelect" name="job">
                <option value="" th:selected="${job == null or job == ''}">전체 직무</option>
                <option th:each="j : ${jobs}" th:value="${j}" th:text="${j}" th:selected="${j == job}">직무</option>
            </select>

            <label for="sortSelect">정렬</label>
            <select id="sortSelect" name="sort">
                <option value="latest" th:selected="${sort == 'latest'}">최신순</option>
                <option value="views" th:selected="${sort == 'views'}">조회순</option>
                <option value="deadline" th:selected="${sort == 'deadline'}">마감임박순</option>
            </select>

            <label for="keywordInput">검색</label>
            <input
                type="text"
                id="keywordInput"
                name="keyword"
                th:value="${keyword}"
                value=""
                placeholder="제목/회사명 검색"
            />

            <button type="submit">검색</button>
            <a class="btn-reset" th:href="@{/experience/list}" href="/experience/list">초기화</a>
        </form>
    </section>

    <section class="list-summary">
        <p>
            총 <strong th:text="${programWithPaging.total}">0</strong>건
        </p>
    </section>

    <section class="program-list">
        <ul th:if="${programWithPaging.programs != null and !programWithPaging.programs.isEmpty()}">
            <li th:each="program : ${programWithPaging.programs}" class="program-card">
                <a class="program-link" th:href="@{/experience/program/{id}(id=${program.id})}" href="#">
                    <div class="thumb-wrap" th:if="${program.experienceProgramFiles != null and !program.experienceProgramFiles.isEmpty()}">
                        <img
                            th:src="@{/api/files/display(filePath=${program.experienceProgramFiles[0].filePath},fileName=${program.experienceProgramFiles[0].fileName})}"
                            src=""
                            th:alt="${program.experienceProgramTitle}"
                            alt="thumbnail"
                        />
                    </div>
                    <div class="thumb-wrap no-image" th:unless="${program.experienceProgramFiles != null and !program.experienceProgramFiles.isEmpty()}">
                        이미지 없음
                    </div>

                    <div class="program-body">
                        <p class="company" th:text="${program.corpCompanyName}">회사명</p>
                        <h2 th:text="${program.experienceProgramTitle}">프로그램 제목</h2>
                        <p class="desc" th:text="${program.descriptionText}">설명</p>
                        <div class="meta">
                            <span th:text="${program.experienceProgramJob}">직무</span>
                            <span>조회수 <strong th:text="${program.experienceProgramViewCount}">0</strong></span>
                            <span>마감 <strong th:text="${program.experienceProgramDeadline}">-</strong></span>
                            <span class="status" th:switch="${program.experienceProgramStatus != null ? program.experienceProgramStatus.name() : 'NONE'}">
                                <em th:case="'RECRUITING'">모집중</em>
                                <em th:case="'DRAFT'">진행중</em>
                                <em th:case="'CLOSED'">모집마감</em>
                                <em th:case="'CANCELLED'">종료</em>
                                <em th:case="*">미정</em>
                            </span>
                        </div>
                    </div>
                </a>
            </li>
        </ul>

        <div class="empty" th:if="${programWithPaging.programs == null or programWithPaging.programs.isEmpty()}">
            조건에 맞는 체험 프로그램이 없습니다.
        </div>
    </section>

    <nav class="pagination" th:if="${programWithPaging.total > 0}">
        <a
            th:if="${programWithPaging.criteria.startPage > 1}"
            th:href="@{/experience/list(page=${programWithPaging.criteria.startPage - 1},status=${status},keyword=${keyword},job=${job},sort=${sort})}"
            href="#"
        >이전</a>

        <a
            th:each="p : ${#numbers.sequence(programWithPaging.criteria.startPage, programWithPaging.criteria.endPage)}"
            th:href="@{/experience/list(page=${p},status=${status},keyword=${keyword},job=${job},sort=${sort})}"
            th:text="${p}"
            th:classappend="${p == programWithPaging.criteria.page} ? 'active'"
            href="#"
        >1</a>

        <a
            th:if="${programWithPaging.criteria.endPage < programWithPaging.criteria.realEnd}"
            th:href="@{/experience/list(page=${programWithPaging.criteria.endPage + 1},status=${status},keyword=${keyword},job=${job},sort=${sort})}"
            href="#"
        >다음</a>
    </nav>
</main>

<script th:src="@{/js/experience/list.js}" src="/js/experience/list.js"></script>
</body>
</html>
