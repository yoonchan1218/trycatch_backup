<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${program.experienceProgramTitle}">체험 프로그램 상세</title>
    <link
        rel="stylesheet"
        th:href="@{/css/experience/training-program.css}"
        href="/css/experience/training-program.css"
    />
</head>
<body>
<main class="experience-detail-page">
    <header class="detail-header">
        <a th:href="@{/experience/list}" href="/experience/list">목록으로</a>
        <h1 th:text="${program.experienceProgramTitle}">프로그램 제목</h1>
        <p class="company" th:text="${program.corpCompanyName}">회사명</p>
    </header>

    <section class="detail-meta">
        <dl>
            <dt>상태</dt>
            <dd th:switch="${program.experienceProgramStatus != null ? program.experienceProgramStatus.name() : 'NONE'}">
                <span th:case="'RECRUITING'">모집중</span>
                <span th:case="'DRAFT'">진행중</span>
                <span th:case="'CLOSED'">모집마감</span>
                <span th:case="'CANCELLED'">종료</span>
                <span th:case="*">미정</span>
            </dd>

            <dt>직무</dt>
            <dd th:text="${program.experienceProgramJob}">직무</dd>

            <dt>모집 인원</dt>
            <dd><span th:text="${program.experienceProgramRecruitmentCount}">0</span>명</dd>

            <dt>근무 기간</dt>
            <dd th:text="${program.experienceProgramWorkDays}">-</dd>

            <dt>근무 시간</dt>
            <dd th:text="${program.experienceProgramWorkHours}">-</dd>

            <dt>마감일</dt>
            <dd th:text="${program.experienceProgramDeadline}">-</dd>

            <dt>조회수</dt>
            <dd th:text="${program.experienceProgramViewCount}">0</dd>
        </dl>
    </section>

    <section class="detail-images" th:if="${program.experienceProgramFiles != null and !program.experienceProgramFiles.isEmpty()}">
        <h2>첨부 이미지</h2>
        <div class="image-grid">
            <img
                th:each="file : ${program.experienceProgramFiles}"
                th:if="${file.fileContentType != null and file.fileContentType.value == 'image'}"
                th:src="@{/api/files/display(filePath=${file.filePath},fileName=${file.fileName})}"
                src=""
                th:alt="${file.fileOriginalName != null ? file.fileOriginalName : 'program-image'}"
                alt="program-image"
            />
        </div>
    </section>

    <section class="detail-description">
        <h2>상세 설명</h2>
        <div class="description-html" th:if="${program.experienceProgramDescription != null and !#strings.isEmpty(program.experienceProgramDescription)}" th:utext="${program.experienceProgramDescription}"></div>
        <p th:unless="${program.experienceProgramDescription != null and !#strings.isEmpty(program.experienceProgramDescription)}">
            등록된 상세 설명이 없습니다.
        </p>
    </section>

    <section class="detail-actions">
        <button
            id="applyButton"
            type="button"
            th:if="${canApply and !hasApplied}"
            th:attr="data-program-id=${program.id}"
        >즉시 지원</button>

        <button type="button" disabled th:if="${canApply and hasApplied}">
            이미 지원한 프로그램입니다
        </button>

        <a
            th:if="${!canApply}"
            th:href="@{/main/log-in(re_url=${'/experience/program/' + program.id})}"
            href="/main/log-in"
        >개인회원 로그인 후 지원하기</a>
    </section>
</main>

<script th:src="@{/js/experience/training-program.js}" src="/js/experience/training-program.js"></script>
</body>
</html>
